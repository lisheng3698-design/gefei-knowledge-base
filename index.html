<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>哥飞知识点全文库</title>
  <meta name="description" content="从 15 个 Markdown 文档按标题生成的哥飞知识点全文阅读库，保留完整正文、步骤、表格和配套图片。">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Cpath d='M17 19h30v6H17zm0 10h30v6H17zm0 10h20v6H17z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=20260630-learning-path">
</head>
<body>
  <div class="app-shell">
    <aside class="doc-rail" aria-label="文档筛选">
      <div class="brand-block">
        <div class="brand-kicker">知识点全文库</div>
        <h1>哥飞资料库</h1>
        <p>按标题拆分知识点，点开显示标题下的完整内容和图片。</p>
      </div>
      <div class="rail-stats" id="railStats"></div>
      <div class="module-switch" aria-label="知识点查看方式">
        <button type="button" id="docModeButton" class="module-button active">文档目录</button>
        <button type="button" id="pathModeButton" class="module-button">上站路径</button>
      </div>
      <nav class="doc-list" id="docList"></nav>
    </aside>

    <main class="workspace">
      <header class="toolbar">
        <div class="search-wrap">
          <label for="searchInput">搜索知识点</label>
          <input id="searchInput" type="search" placeholder="输入关键词、章节名、来源文件..." autocomplete="off">
        </div>
        <div class="toolbar-actions">
          <button type="button" class="tool-icon-button" id="clearFilters" aria-label="清除筛选" title="清除筛选">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 5h16l-6.2 7.1v5.2l-3.6 1.8v-7L4 5Z"/><path d="m16 16 4 4m0-4-4 4"/></svg>
          </button>
          <button type="button" class="tool-icon-button" id="copyLink" aria-label="复制当前链接" title="复制当前链接">
            <svg class="icon-link" aria-hidden="true" viewBox="0 0 24 24"><path d="M9.5 14.5 14.5 9.5"/><path d="M13 6.5 14.4 5a4 4 0 0 1 5.6 5.6L17.8 13a4 4 0 0 1-5.6 0"/><path d="M11 17.5 9.6 19a4 4 0 0 1-5.6-5.6L6.2 11a4 4 0 0 1 5.6 0"/></svg>
            <svg class="icon-check" aria-hidden="true" viewBox="0 0 24 24"><path d="m5 12.5 4.2 4.2L19 7"/></svg>
          </button>
          <button type="button" class="tool-icon-button sync-button" id="syncButton" aria-label="已学云同步" title="已学云同步">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M17.5 18H8a4 4 0 0 1-.7-7.9 5.5 5.5 0 0 1 10.5 1.8A3.1 3.1 0 0 1 17.5 18Z"/><path d="M12 9v6"/><path d="m9.5 12.5 2.5 2.5 2.5-2.5"/></svg>
            <span class="sync-dot" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <nav class="mobile-nav" aria-label="移动端导航">
        <label class="mobile-select-wrap" for="mobileDocSelect">
          <select id="mobileDocSelect" aria-label="一级导航"></select>
        </label>
        <label class="mobile-select-wrap" for="mobileItemSelect">
          <select id="mobileItemSelect" aria-label="二级导航"></select>
        </label>
      </nav>

      <section class="content-grid">
        <aside class="result-pane" aria-label="知识点列表">
          <div class="result-head">
            <div>
              <div class="eyebrow">标题知识点</div>
              <strong id="resultCount">0 条</strong>
            </div>
          <select id="sortSelect" aria-label="排序方式">
            <option value="source">按来源顺序</option>
            <option value="path">按上站路径</option>
            <option value="long">正文最长优先</option>
            <option value="images">图片最多优先</option>
          </select>
          </div>
          <div class="result-list" id="resultList"></div>
        </aside>

        <article class="reader" id="reader" aria-live="polite">
          <div class="empty-state">
            <h2>选择一个知识点开始阅读</h2>
            <p>左侧列表按 Markdown 标题拆分；右侧展示该标题下的完整正文、步骤、表格和图片。</p>
          </div>
        </article>
      </section>

      <div class="reader-float-actions" aria-label="阅读操作">
        <button class="reader-learned-button" id="markLearnedButton" type="button" aria-label="标记当前知识点为已学">已学</button>
        <button class="reader-top-button" id="readerTopButton" type="button" aria-label="回到详情顶部">Top</button>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button">关闭</button>
    <img id="lightboxImage" alt="放大查看的截图">
    <div class="lightbox-caption" id="lightboxCaption"></div>
  </div>

  <div class="sync-modal" id="syncModal" aria-hidden="true">
    <div class="sync-card" role="dialog" aria-modal="true" aria-labelledby="syncTitle">
      <div class="sync-card-head">
        <div>
          <div class="eyebrow">已学同步</div>
          <h2 id="syncTitle">云端同步</h2>
        </div>
        <button type="button" class="sync-close" id="syncClose" aria-label="关闭同步设置">关闭</button>
      </div>
      <form class="sync-form" id="syncForm">
        <label>
          <span>Gist ID</span>
          <input id="syncGistId" name="gistId" type="text" autocomplete="off" placeholder="例如 1a2b3c...">
        </label>
        <label>
          <span>GitHub Token</span>
          <input id="syncToken" name="token" type="password" autocomplete="off" placeholder="只需要 gist 权限">
        </label>
        <label>
          <span>文件名</span>
          <input id="syncFileName" name="fileName" type="text" autocomplete="off" value="gefei-learned.json">
        </label>
        <div class="sync-actions">
          <button type="submit" class="sync-primary">保存并同步</button>
          <button type="button" id="syncNow">立即同步</button>
          <button type="button" id="syncForget">清除配置</button>
        </div>
        <p class="sync-status" id="syncStatus">未配置云同步</p>
      </form>
    </div>
  </div>

  <script src="kb-data.js"></script>
  <script src="learning-path.js"></script>
  <script src="app.js?v=20260630-learning-path"></script>
</body>
</html>
